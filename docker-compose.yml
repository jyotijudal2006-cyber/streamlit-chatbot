version: '3.8'

services:
  backend:
    build: ./backend
    container_name: file_chatbot_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - chatbot_net

  frontend:
    build: ./frontend
    container_name: file_chatbot_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
      - ./.env:/app/.env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - chatbot_net

networks:
  chatbot_net:
    driver: bridge
